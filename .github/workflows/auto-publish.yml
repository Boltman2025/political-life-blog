name: 🤖 Auto Publish Articles Daily

on:
  schedule:
    - cron: '0 9 * * *'  # 9AM UTC = 10AM Algiers
  workflow_dispatch:  # يدوي

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install Dependencies
      run: |
        pip install --upgrade pip
        pip install groq tavily-python requests
    
    - name: 📁 Create Data Directory
      run: mkdir -p data
    
    - name: 🚀 Generate Professional Articles
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        echo "🚀 بدء إنتاج المقالات الاحترافية..."
        python agent.py
        echo "✅ انتهى الإنتاج!"
    
    - name: 🔍 Verify Articles Generated
      run: |
        if [ -f data/articles.json ]; then
          COUNT=$(jq length data/articles.json)
          echo "✅ تم إنتاج $COUNT مقال"
          jq '.[0] | {title, category, imageUrl}' data/articles.json
        else
          echo "❌ خطأ: ملف articles.json غير موجود!"
          exit 1
        fi
    
    - name: 💾 Commit & Push Articles
      run: |
        git config --local user.email "ai-bot@political-life.al"
        git config --local user.name "🤖 AI News Bot"
        git add data/articles.json
        if git diff --staged --quiet; then
          echo "ℹ️  لا تغييرات جديدة"
        else
          git commit -m "🤖 نشر يومي $(date +%Y-%m-%d) - $(jq length data/articles.json) مقال جديد"
          git push
          echo "✅ ✅ تم النشر بنجاح على GitHub!"
        fi
