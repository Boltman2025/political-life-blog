# .github/workflows/pentest.yml
name: 🛡️ Pentest News Scraper
on: 
  workflow_dispatch:
  schedule:
    - cron: '*/2 * * * *'  # كل دقيقتين

jobs:
  pentest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: { python-version: '3.11' }
    - run: pip install requests beautifulsoup4 lxml
    - run: mkdir -p data
    - run: python agent.py
    - run: |
        git config user.name "pentest-bot"
        git config user.email "pentest@dz"
        git add data/live.json
        git commit -m "🛡️ pentest update $(date)" || exit 0
        git push
