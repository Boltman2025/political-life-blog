name: 🚨 Live Algerian News Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # كل 5 دقائق!
  workflow_dispatch:

jobs:
  monitor-news:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install
      run: |
        pip install groq requests beautifulsoup4 lxml
    
    - name: 📁 Data Dir
      run: mkdir -p data
    
    - name: 🚨 Fetch Live News
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        echo "🚨 بدء مراقبة الأخبار الجزائرية..."
        python agent.py
        echo "✅ ✅ تم!"
    
    - name: 🔍 Verify
      run: |
        jq . data/articles.json
        echo "✅ جاهز للنشر!"
    
    - name: 💾 Deploy
      run: |
        git config --local user.email "news-bot@algeria.live"
        git config --local user.name "🚨 Algerian News Bot"
        git add data/articles.json
        if ! git diff --staged --quiet; then
          git commit -m "🚨 أخبار حية $(date '+%Y-%m-%d %H:%M')"
          git push
          echo "🌐 منشور على الموقع!"
        else
          echo "ℹ️  لا أخبار جديدة"
        fi
